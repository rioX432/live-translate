<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Translate</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
    }

    .status-badge.connected {
      background: #22c55e;
    }

    .status-badge.capturing {
      background: #f59e0b;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .meeting-info {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .meeting-info .label {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .meeting-info .value {
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .settings-row label {
      font-size: 13px;
      color: #94a3b8;
    }

    .settings-row input {
      width: 80px;
      padding: 4px 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 13px;
      text-align: center;
    }

    .settings-row input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-start {
      background: #3b82f6;
      color: white;
    }

    .btn-start:hover {
      background: #2563eb;
    }

    .btn-start:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
    }

    .btn-stop {
      background: #ef4444;
      color: white;
    }

    .btn-stop:hover {
      background: #dc2626;
    }

    .error {
      background: #7f1d1d;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #fca5a5;
    }

    .help-text {
      font-size: 11px;
      color: #64748b;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>
    <span class="status-badge" id="statusBadge"></span>
    Live Translate
  </h1>

  <div class="meeting-info">
    <div class="label">Current Tab</div>
    <div class="value" id="tabTitle">Loading...</div>
  </div>

  <div class="meeting-info" id="platformInfo" style="display:none">
    <div class="label">Detected Platform</div>
    <div class="value" id="platformName">-</div>
  </div>

  <div class="settings-row">
    <label for="wsPort">WebSocket Port</label>
    <input type="number" id="wsPort" value="9876" min="1024" max="65535">
  </div>

  <div id="errorBox" class="error" style="display:none"></div>

  <button class="btn btn-start" id="startBtn">Start Capture</button>
  <button class="btn btn-stop" id="stopBtn" style="display:none">Stop Capture</button>

  <div class="help-text">
    Captures audio from the current browser tab and streams it to
    the Live Translate desktop app for real-time translation.
    Make sure the desktop app is running with the WebSocket server enabled.
  </div>

  <script src="popup.js"></script>
</body>
</html>
